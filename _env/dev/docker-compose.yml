name: "zod"

services:
  zod-api:
    container_name: zod-api
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    env_file:
      - .env
    ports:
      - "8080:${APP_API_PORT:-8080}"
    networks:
      - zod-network
    working_dir: /app
    volumes:
      - .:/app

networks:
  zod-network:
    driver: bridge
